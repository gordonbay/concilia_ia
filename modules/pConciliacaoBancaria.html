<div class="container-fluid p-4">
    <style>
        .select2-container .select2-selection--single { height: 34px !important; display: flex !important; align-items: center !important; border-color: #dee2e6 !important; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: normal !important; padding-left: 12px !important; color: #495057 !important; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 32px !important; }
        .select2-container--default .select2-selection--single .select2-selection__placeholder { color: #6c757d !important; }
        .fw-semibold    { font-weight: 600 !important; }
        .text-xs        { font-size: 0.75rem; }
        .cursor-pointer { cursor: pointer; }
        .main-row:hover { background-color: #f8f9fa; }
        .edit-row > td  { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .twitter-typeahead { width: 100%; display: block !important; }
        /* Aumentei a altura maxima para caber as descrições detalhadas */
        .tt-menu { background-color: #fff; border: 1px solid #dee2e6; border-radius: 0.375rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15); width: 100%; max-height: 350px; overflow-y: auto; z-index: 9999; margin-top: 2px; }
        .tt-suggestion { cursor: pointer; padding: 0; border-bottom: 1px solid #f0f0f0; } /* Padding removido aqui para controlar no template */
        .tt-suggestion:hover, .tt-cursor { background-color: #e9ecef; color: #1e2125; }
        .tt-hint { color: #adb5bd !important; }

        .actions-cell { white-space: nowrap; }
        .actions-cell .action-icon {
            display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px;
            border-radius: 6px; border: none; background: transparent; cursor: pointer;
            transition: background .15s, opacity .15s, color .15s; color: #6c757d; font-size: 0.95rem; padding: 0;
        }
        .actions-cell .action-icon:hover { background: #f1f3f5; color: #343a40; }
        .actions-cell .action-icon.approve  { color: #198754; }
        .actions-cell .action-icon.approve:hover  { background: #d1e7dd; }
        .actions-cell .action-icon.unapprove  { color: #198754; }
        .actions-cell .action-icon.unapprove:hover  { background: #d1e7dd; }
        
        /* Cor de finanças para finalizar */
        .actions-cell .action-icon.finalize { color: #0d6efd; }
        .actions-cell .action-icon.finalize:hover { background: #cfe2ff; }
        .actions-cell .action-icon.unfinalize { color: #0d6efd; }
        .actions-cell .action-icon.unfinalize:hover { background: #cfe2ff; }
        
        .actions-cell .action-icon.del     { color: #dc3545; }
        .actions-cell .action-icon.del:hover     { background: #f8d7da; }
        .actions-cell .action-icon:disabled, .actions-cell .action-icon.loading  { opacity: .45; pointer-events: none; }
        .actions-cell .action-icon .spinner-border { width: .75rem; height: .75rem; border-width: 2px; }
        
        .filter-label { font-size: 0.7rem; font-weight: 700; color: #6c757d; margin-bottom: 2px; text-transform: uppercase; }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h4 class="mb-0 fw-bold text-gray-800"><i class="ph-bank me-2"></i>Conciliação Bancária</h4>
            <small class="text-muted">Classificação de pagamentos e conciliação manual</small>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap ms-auto" id="headerToolbar">
            <button class="btn btn-primary btn-sm" onclick="ConciliacaoMain.loadData()">
                <i class="ph-magnifying-glass me-1"></i> Filtrar / Atualizar
            </button>
            <button class="btn btn-success btn-sm" onclick="ConciliacaoMain.addNewRow()">
                <i class="ph-plus me-1"></i> Nova Conciliação
            </button>
        </div>
    </div>

    <!-- ── Painel de Filtros ────────────────────────────────────────────── -->
    <div class="card shadow-sm border-0 mb-3 bg-light">
        <div class="card-body p-3">
            <div class="row g-2">
                <!-- Filtro Data Criação -->
                <div class="col-md-3 col-lg-2">
                    <label class="filter-label">Data Criação</label>
                    <div id="dateRangeConciliacao" class="form-control form-control-sm d-flex align-items-center bg-white" style="cursor:pointer;">
                        <i class="ph-calendar me-2 text-muted"></i><span class="text-truncate"></span>
                    </div>
                </div>
                <!-- Filtro Vencimento -->
                <div class="col-md-3 col-lg-2">
                    <label class="filter-label">Vencimento (Parcelas)</label>
                    <div id="dateRangeVencimento" class="form-control form-control-sm d-flex align-items-center bg-white" style="cursor:pointer;">
                        <i class="ph-calendar-check me-2 text-muted"></i><span class="text-truncate">Todos</span>
                    </div>
                </div>
                <!-- Status -->
                <div class="col-6 col-md-2">
                    <label class="filter-label">Status</label>
                    <select class="form-select form-select-sm" id="filtro_status">
                        <option value="">Todos</option>
                        <option value="pendente">Pendente</option>
                        <option value="aprovado">Aprovado (Concluído)</option>
                        <option value="finalizado">Pago (Finalizado)</option>
                        <option value="pago_adiantamento" class="text-warning fw-bold">Pago - Adiantamento</option>
                    </select>
                </div>
                <!-- Empresa -->
                <div class="col-6 col-md-2">
                    <label class="filter-label">Pagador / Empresa</label>
                    <select class="form-select form-select-sm" id="filtro_empresa">
                        <option value="">Todas</option>
                    </select>
                </div>
                <!-- Usuário -->
                <div class="col-6 col-md-2">
                    <label class="filter-label">Usuário</label>
                    <select class="form-select form-select-sm" id="filtro_usuario">
                        <option value="">Todos</option>
                    </select>
                </div>
                <!-- Operação -->
                <div class="col-6 col-md-2">
                    <label class="filter-label">Operação</label>
                    <select class="form-select form-select-sm" id="filtro_operacao">
                        <option value="">Todas</option>
                        <option value="pix">PIX</option>
                        <option value="boleto">Boleto</option>
                        <option value="DDA">DDA</option>
                        <option value="transferencia">Transferência</option>
                        <option value="darf">DARF</option>
                    </select>
                </div>
                <!-- Doc / NF (NOVO) -->
                <div class="col-6 col-md-2">
                    <label class="filter-label">Doc / NF</label>
                    <input type="text" class="form-control form-control-sm" id="filtro_doc" placeholder="Nº Doc ou NF...">
                </div>
                <div class="col-6 col-md-2">
                    <label class="filter-label">Recebedor / Fornecedor</label>
                    <input type="text" class="form-control form-control-sm" id="filtro_recebedor" placeholder="Buscar nome...">
                </div>

                <!-- NOVO CAMPO: Valor -->
                <div class="col-6 col-md-1">
                    <label class="filter-label">Valor (R$)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro_valor" placeholder="0,00">
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive" style="overflow-x: visible;">
                <table class="table align-middle mb-0 text-sm">
                    <thead class="table-light">
                        <tr>
                            <th style="width:32px;" class="text-center"></th>
                            <th>Data / Usuário</th>
                            <th>Status</th>
                            <th>Pagador / Conta</th>
                            <th>Recebedor</th>
                            <th>Doc / NF</th>
                            <th>Operação</th>
                            <th>Parcelas</th>
                            <th class="text-end">Valor (R$)</th>
                            <th style="width:200px;">Natureza</th>
                            <th style="width:80px;" class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyConciliacao">
                        <tr><td colspan="11" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-top py-2">
            <small class="text-muted" id="conciliacaoInfo">Mostrando 0 registros</small>
        </div>
    </div>
</div>

<script>
(function() {
    var MODULE_SCRIPTS = [
        '/modules/pConciliacaoBancaria/js/utils.js',
        '/modules/pConciliacaoBancaria/js/api.js',
        '/modules/pConciliacaoBancaria/js/ui.setup.js',
        '/modules/pConciliacaoBancaria/js/ui.form.js',
        '/modules/pConciliacaoBancaria/js/ui.typeahead.js',
        '/modules/pConciliacaoBancaria/js/ui.anexos.js',
        '/modules/pConciliacaoBancaria/js/ui.table.js',
        '/modules/pConciliacaoBancaria/js/ui.export.js',  // <--- ADICIONADO AQUI
        '/modules/pConciliacaoBancaria/js/main.js'
    ];

    function loadScript(src, cb) {
        var s = document.createElement('script');
        s.src = src + '?v=' + Date.now();
        s.onload = cb;
        s.onerror = function() { console.error('Erro ao carregar: ' + src); cb(); };
        document.body.appendChild(s);
    }

    function loadAll(scripts, idx) {
        if (idx >= scripts.length) {
            if (typeof ConciliacaoMain !== 'undefined') ConciliacaoMain.init();
            return;
        }
        loadScript(scripts[idx], function() { loadAll(scripts, idx + 1); });
    }

    loadAll(MODULE_SCRIPTS, 0);
})();
</script>
